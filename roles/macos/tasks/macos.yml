---
- name: Configure macOS Dock
  tags: macos, dock
  block:
    - name: Set Dock size (small)
      community.general.osx_defaults:
        domain: com.apple.dock
        key: tilesize
        type: float
        value: 28

    - name: Disable Dock magnification
      community.general.osx_defaults:
        domain: com.apple.dock
        key: magnification
        type: bool
        value: false

    - name: Set Dock position to right
      community.general.osx_defaults:
        domain: com.apple.dock
        key: orientation
        type: string
        value: right

    - name: Set minimize window effect to Genie
      community.general.osx_defaults:
        domain: com.apple.dock
        key: mineffect
        type: string
        value: genie

    - name: Disable minimize windows into application icon
      community.general.osx_defaults:
        domain: com.apple.dock
        key: minimize-to-application
        type: bool
        value: false

    - name: Disable Dock auto-hide
      community.general.osx_defaults:
        domain: com.apple.dock
        key: autohide
        type: bool
        value: false

    - name: Enable animate opening applications
      community.general.osx_defaults:
        domain: com.apple.dock
        key: launchanim
        type: bool
        value: true

    - name: Show indicators for open applications
      community.general.osx_defaults:
        domain: com.apple.dock
        key: show-process-indicators
        type: bool
        value: true

    - name: Disable show recent apps in Dock
      community.general.osx_defaults:
        domain: com.apple.dock
        key: show-recents
        type: bool
        value: false

    - name: Restart Dock to apply changes
      ansible.builtin.command: killall Dock
      changed_when: true

- name: Configure macOS Finder
  tags: macos, finder
  block:
    - name: Show all filename extensions
      community.general.osx_defaults:
        domain: NSGlobalDomain
        key: AppleShowAllExtensions
        type: bool
        value: true

    - name: Show hidden files
      community.general.osx_defaults:
        domain: com.apple.finder
        key: AppleShowAllFiles
        type: bool
        value: true

    - name: Show path bar
      community.general.osx_defaults:
        domain: com.apple.finder
        key: ShowPathbar
        type: bool
        value: true

    - name: Show status bar
      community.general.osx_defaults:
        domain: com.apple.finder
        key: ShowStatusBar
        type: bool
        value: true

    - name: Keep folders on top when sorting by name
      community.general.osx_defaults:
        domain: com.apple.finder
        key: _FXSortFoldersFirst
        type: bool
        value: true

    - name: Search the current folder by default
      community.general.osx_defaults:
        domain: com.apple.finder
        key: FXDefaultSearchScope
        type: string
        value: SCcf

    - name: Disable the warning when changing a file extension
      community.general.osx_defaults:
        domain: com.apple.finder
        key: FXEnableExtensionChangeWarning
        type: bool
        value: false

    - name: Use list view by default
      community.general.osx_defaults:
        domain: com.apple.finder
        key: FXPreferredViewStyle
        type: string
        value: clmv

    - name: Restart Finder to apply changes
      ansible.builtin.command: killall Finder
      changed_when: true

- name: Configure macOS Keyboard
  tags: macos, keyboard
  block:
    - name: Enable full keyboard access for all controls
      community.general.osx_defaults:
        domain: NSGlobalDomain
        key: AppleKeyboardUIMode
        type: int
        value: 1

    - name: Enable automatic capitalization
      community.general.osx_defaults:
        domain: NSGlobalDomain
        key: NSAutomaticCapitalizationEnabled
        type: bool
        value: true

    - name: Enable automatic period substitution
      community.general.osx_defaults:
        domain: NSGlobalDomain
        key: NSAutomaticPeriodSubstitutionEnabled
        type: bool
        value: true

    - name: Disable Spotlight shortcuts to free ⌘Space for Raycast
      ansible.builtin.shell: |
        defaults write com.apple.symbolichotkeys AppleSymbolicHotKeys -dict-add 60 "
          <dict>
            <key>enabled</key><false/>
            <key>value</key><dict>
              <key>parameters</key><array><integer>32</integer><integer>49</integer><integer>262144</integer></array>
              <key>type</key><string>standard</string>
            </dict>
          </dict>"
        defaults write com.apple.symbolichotkeys AppleSymbolicHotKeys -dict-add 61 "
          <dict>
            <key>enabled</key><false/>
            <key>value</key><dict>
              <key>parameters</key><array><integer>32</integer><integer>49</integer><integer>786432</integer></array>
              <key>type</key><string>standard</string>
            </dict>
          </dict>"
        defaults write com.apple.symbolichotkeys AppleSymbolicHotKeys -dict-add 64 "
          <dict>
            <key>enabled</key><false/>
            <key>value</key><dict>
              <key>parameters</key><array><integer>32</integer><integer>49</integer><integer>1048576</integer></array>
              <key>type</key><string>standard</string>
            </dict>
          </dict>"
        defaults write com.apple.symbolichotkeys AppleSymbolicHotKeys -dict-add 65 "
          <dict>
            <key>enabled</key><false/>
            <key>value</key><dict>
              <key>parameters</key><array><integer>32</integer><integer>49</integer><integer>1572864</integer></array>
              <key>type</key><string>standard</string>
            </dict>
          </dict>"
      changed_when: true

    - name: Apply Spotlight shortcut changes
      ansible.builtin.command: /System/Library/PrivateFrameworks/SystemAdministration.framework/Resources/activateSettings -u
      changed_when: true

    - name: Set Raycast global hotkey to ⌘Space
      community.general.osx_defaults:
        domain: com.raycast.macos
        key: raycastGlobalHotkey
        type: string
        value: "Command-49"
