---
- name: Clone dotfiles repository
  ansible.builtin.git:
    repo: "{{ dotfiles_repo }}"
    dest: "{{ dotfiles_dest }}"
    update: yes
  tags:
    - dotfiles
    - install

- name: Ensure ~/.config exists
  ansible.builtin.file:
    path: "{{ home_dir }}/.config"
    state: directory
    mode: "0755"
  tags:
    - dotfiles
    - install

- name: Sync dotfiles .config to ~/.config
  ansible.posix.synchronize:
    src: "{{ dotfiles_dest }}/.config/"
    dest: "{{ home_dir }}/.config/"
    delete: no
  tags:
    - dotfiles
    - install

- name: Sync dotfiles .config_macos to ~/.config
  ansible.posix.synchronize:
    src: "{{ dotfiles_dest }}/.config_macos/"
    dest: "{{ home_dir }}/.config/"
    delete: no
  notify:
    - Restart Yabai
    - Restart skhd-zig
  tags:
    - dotfiles
    - install

- name: Copy .zshrc_macos to ~/.zshrc
  ansible.builtin.copy:
    src: "{{ dotfiles_dest }}/.zshrc_macos"
    dest: "{{ home_dir }}/.zshrc"
    remote_src: yes
  tags:
    - dotfiles
    - install

- name: Sync dotfiles git_hooks to ~/git_hooks
  ansible.posix.synchronize:
    src: "{{ dotfiles_dest }}/git_hooks/"
    dest: "{{ home_dir }}/git_hooks/"
    delete: no
  tags:
    - dotfiles
    - install

- name: Check which gitconfig files exist in dotfiles
  ansible.builtin.stat:
    path: "{{ dotfiles_dest }}/{{ item }}"
  register: gitconfig_files_check
  loop:
    - .gitconfig-personal
    - .gitconfig-work
    - .gitconfig
  tags:
    - dotfiles
    - install

- name: Copy gitconfig files from dotfiles to HOME
  ansible.builtin.copy:
    src: "{{ dotfiles_dest }}/{{ item.item }}"
    dest: "{{ home_dir }}/{{ item.item }}"
    remote_src: yes
  loop: "{{ gitconfig_files_check.results }}"
  when: item.stat.exists | default(false)
  tags:
    - dotfiles
    - install
