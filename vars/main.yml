---
# Configuration variables for the daily-driver playbook
# Override with -e "var=value" or use group_vars/host_vars

# User home directory (avoids hardcoding ~)
home_dir: "{{ lookup('env', 'HOME') }}"

# --- Dotfiles ---
dotfiles_repo: "https://github.com/user-cube/dotfiles.git"
dotfiles_dest: "{{ home_dir }}/dotfiles"

# --- Directories to create in $HOME ---
directories_to_create:
  - personal
  - work
  - hooks

# --- Neovim / NvChad ---
nvim_starter_repo: "https://github.com/NvChad/starter"
nvim_config_dest: "{{ home_dir }}/.config/nvim"

# --- Zsh / Powerlevel10k ---
zsh_theme_repo: "https://github.com/romkatv/powerlevel10k.git"
zsh_theme_dest: "{{ home_dir }}/powerlevel10k"

# --- Fonts (Powerlevel10k Meslo) ---
fonts_base_url: "https://github.com/romkatv/powerlevel10k-media/raw/master"
fonts_dest_dir: "{{ home_dir }}/Library/Fonts"
fonts_meslo_files:
  - "MesloLGS NF Regular.ttf"
  - "MesloLGS NF Bold.ttf"
  - "MesloLGS NF Italic.ttf"
  - "MesloLGS NF Bold Italic.ttf"

# --- Custom Go tools (go install) ---
custom_go_tools:
  - github.com/user-cube/kontext@latest
  - github.com/user-cube/gclone@latest
  - github.com/user-cube/aws-cli-manager/v2@latest
  - github.com/user-cube/auth-refresher@latest
