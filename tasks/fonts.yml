- name: Ensure fonts directory exists
  ansible.builtin.file:
    path: "{{ fonts_dest_dir }}"
    state: directory
    mode: "0755"
  tags:
    - install
    - fonts

- name: Install MesloLGS NF fonts (Powerlevel10k)
  ansible.builtin.get_url:
    url: "{{ fonts_base_url }}/{{ item | replace(' ', '%20') }}"
    dest: "{{ fonts_dest_dir }}/{{ item }}"
  loop: "{{ fonts_meslo_files }}"
  tags:
    - install
    - fonts
